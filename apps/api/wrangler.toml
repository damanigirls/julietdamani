name = "juliet-api-backend"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — binds api.julietdamani.com directly to this worker
# (wrangler creates/maintains the Custom Domain + DNS record on deploy)
[[routes]]
pattern = "api.julietdamani.com"
custom_domain = true

[vars]
BABYSITTING_ADMIN_PASS = "juliet123"

[[d1_databases]]
binding = "DB"
database_name = "juliet-babysitting"
database_id = "f585b77f-1a9e-4996-919c-05a7011db162"
